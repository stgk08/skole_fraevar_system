{% extends "base.html" %}

{% block title %}Logg inn{% endblock %}

{% block content %}

<h1>Logg inn</h1>

<p>Logg inn for å bruke skole-fraværssystemet.</p>

{% if error %}
    <div class="error-box">
        {{ error }}
    </div>
{% endif %}

<form method="POST">
    <label>Brukernavn:</label>
    <input type="text" name="brukernavn" required>

    <label>Passord:</label>
    <input type="password" name="passord" required>

    <button type="submit">Logg inn</button>
</form>

<p>
    Har du ikke bruker?
    <a href="/register">Registrer deg her</a>
</p>

{% endblock %}
